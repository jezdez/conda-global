[package]
name = "conda-trampoline"
version = "0.1.1"
edition = "2021"
license = "BSD-3-Clause"
description = "Trampoline binary for conda: launches tools from isolated conda environments"
repository = "https://github.com/conda-incubator/conda-global"
readme = "README.md"

[[bin]]
name = "_cg_trampoline"
path = "src/main.rs"

[dependencies]
ctrlc = "3.5"
fs-err = "3.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
