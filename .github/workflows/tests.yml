name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_global/**"
      - "packages/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "Cargo.toml"
      - "tests/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "conda_global/**"
      - "packages/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "Cargo.toml"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: dev
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: clippy-${{ hashFiles('Cargo.lock') }}
      - name: Lint Python
        run: pixi run -e dev lint
      - name: Format check
        run: pixi run -e dev format-check
      - name: Clippy
        run: pixi run -e dev clippy

  build-trampoline:
    name: Build trampoline (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Build trampoline
        run: pixi run build

  tests:
    name: ${{ matrix.os }}, Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: test
      - name: Run tests
        run: pixi run -e test test-cov
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: ${{ github.event_name != 'pull_request' }}
          token: ${{ secrets.CODECOV_TOKEN }}
